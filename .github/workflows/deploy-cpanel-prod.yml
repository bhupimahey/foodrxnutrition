name: Deploy to cPanel Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

jobs:
  deploy:
    if: github.event.inputs.confirm == 'deploy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy theme to cPanel via rsync
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'scripts/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude '.DS_Store' \
            --exclude 'Thumbs.db' \
            -e "ssh -p ${{ secrets.PROD_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_REMOTE_ROOT }}/"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
