name: Deploy to cPanel Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy theme to cPanel
        env:
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
        run: |
          set -euo pipefail

          SSH_KEY="$HOME/.ssh/id_rsa"
          SSH_COMMON="-i ${SSH_KEY} -o StrictHostKeyChecking=no -o LogLevel=ERROR"
          RSYNC_SSH="ssh -p ${SSH_PORT} ${SSH_COMMON} -T"
          REMOTE="${SSH_USER}@${SSH_HOST}:${REMOTE_ROOT}/"

          RSYNC_EXCLUDES=(
            --exclude '.git/'
            --exclude '.github/'
            --exclude 'scripts/'
            --exclude 'node_modules/'
            --exclude 'content/'
            --exclude '.env'
            --exclude '.DS_Store'
            --exclude 'Thumbs.db'
          )

          # cPanel/jailshell often prints login banners or lacks a matching rsync.
          shell_is_clean() {
            local probe="${RUNNER_TEMP}/ssh-shell-probe.out"
            ssh -p "${SSH_PORT}" ${SSH_COMMON} -T "${SSH_USER}@${SSH_HOST}" /bin/true > "${probe}" 2>&1 || true
            if [ -s "${probe}" ]; then
              echo "Remote shell is not clean (profile/banner output detected); skipping rsync."
              cat "${probe}"
              return 1
            fi
            return 0
          }

          deploy_rsync() {
            rsync -avz --delete "${RSYNC_EXCLUDES[@]}" \
              --rsync-path='/usr/bin/rsync' \
              -e "${RSYNC_SSH}" \
              ./ "${REMOTE}"
          }

          deploy_tar() {
            echo "Falling back to tar + scp deploy..."
            REMOTE_TAR="foodrx-theme-deploy-$(date +%s).tar.gz"
            TAR_FILE="${RUNNER_TEMP}/${REMOTE_TAR}"

            tar czf "${TAR_FILE}" \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='scripts' \
              --exclude='node_modules' \
              --exclude='content' \
              --exclude='.env' \
              --exclude='.DS_Store' \
              --exclude='Thumbs.db' \
              .

            scp -P "${SSH_PORT}" ${SSH_COMMON} \
              "${TAR_FILE}" "${SSH_USER}@${SSH_HOST}:~/${REMOTE_TAR}"

            ssh -p "${SSH_PORT}" ${SSH_COMMON} -T "${SSH_USER}@${SSH_HOST}" \
              "mkdir -p '${REMOTE_ROOT}' && cd '${REMOTE_ROOT}' && tar xzf ~/${REMOTE_TAR} && rm -f ~/${REMOTE_TAR}"

            rm -f "${TAR_FILE}"
            echo "Deployed via tar + scp (remote files not in repo are kept)."
          }

          set +e
          RSYNC_EXIT=1
          if shell_is_clean; then
            deploy_rsync
            RSYNC_EXIT=$?
          fi
          set -e

          if [ "${RSYNC_EXIT}" -eq 0 ]; then
            echo "Deployed via rsync."
          else
            echo "rsync failed or was skipped (exit ${RSYNC_EXIT})."
            deploy_tar
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
